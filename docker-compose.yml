version: "3.9"

services:
  # Servicio de la Base de Datos
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - heald_net_network
    
  # Tu aplicación NestJS
  nestjs:
    build: .
    container_name: nestjs_app
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - heald_net_network

networks:
  heald_net_network:
    name: heald_network
    driver: bridge

volumes:
  postgres_data: